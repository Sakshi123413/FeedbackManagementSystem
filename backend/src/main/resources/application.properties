# ============================================
# Server Configuration
# ============================================
server.port=8080

# ============================================
# MySQL Database Configuration
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/feedback_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Sakshi@1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA / Hibernate Configuration
# ============================================
# IMPORTANT: Use 'update' only — never 'create' or 'create-drop' (causes data loss on restart)
spring.jpa.hibernate.ddl-auto=update

# IMPORTANT: Must be 'never' — prevents schema.sql auto-execution that would INSERT duplicate data on every startup
spring.sql.init.mode=never
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================
# JWT Configuration
# ============================================
app.jwt.secret=YourSuperSecretKeyForJWTTokenGenerationThatShouldBeAtLeast256BitsLongForHS256Algorithm
app.jwt.expiration-ms=86400000

# ============================================
# Swagger / OpenAPI Configuration
# ============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ============================================
# Logging Configuration
# ============================================
logging.level.org.springframework.security=WARN
logging.level.com.feedbackmanagement=INFO